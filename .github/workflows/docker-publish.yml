name: H2C Release

on:
  push:
    tags:
      - "v*-h2c*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  packages: write
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: inherent-design/cloudflared

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            asset: cloudflared-linux-amd64
          - arch: arm64
            asset: cloudflared-linux-arm64
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw_tag="${{ inputs.release_tag }}"
          else
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${raw_tag}" || "${raw_tag}" != v*-h2c* ]]; then
            echo "Invalid h2c release tag: ${raw_tag}" >&2
            exit 1
          fi

          echo "raw_tag=${raw_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${raw_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.vars.outputs.raw_tag }}

      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          make VERSION=${{ steps.vars.outputs.release_version }} TARGET_OS=linux TARGET_ARCH=${{ matrix.arch }} cloudflared
          mv cloudflared ${{ matrix.asset }}

      - name: Verify embedded version
        shell: bash
        run: |
          go version -m ${{ matrix.asset }} | tee version.txt
          grep -F "main.Version=${{ steps.vars.outputs.release_version }}" version.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw_tag="${{ inputs.release_tag }}"
          else
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${raw_tag}" || "${raw_tag}" != v*-h2c* ]]; then
            echo "Invalid h2c release tag: ${raw_tag}" >&2
            exit 1
          fi

          echo "raw_tag=${raw_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${raw_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.vars.outputs.raw_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.release_version }}
            type=raw,value=latest-h2c

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.release_version }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - build-and-push
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw_tag="${{ inputs.release_tag }}"
          else
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${raw_tag}" || "${raw_tag}" != v*-h2c* ]]; then
            echo "Invalid h2c release tag: ${raw_tag}" >&2
            exit 1
          fi

          echo "raw_tag=${raw_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${raw_tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Download binary artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: cloudflared-linux-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          shasum -a 256 cloudflared-linux-amd64 cloudflared-linux-arm64 > SHA256SUMS

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Fork h2c release for cloudflared.

          Container image:
          - ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.release_version }}

          Assets:
          - cloudflared-linux-amd64
          - cloudflared-linux-arm64
          - SHA256SUMS
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${{ steps.vars.outputs.raw_tag }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${{ steps.vars.outputs.raw_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.vars.outputs.release_version }}" \
              --notes-file release-notes.md
          fi

          gh release upload "${{ steps.vars.outputs.raw_tag }}" \
            release-artifacts/cloudflared-linux-amd64 \
            release-artifacts/cloudflared-linux-arm64 \
            release-artifacts/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
